name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Push version commits and create GitHub releases
      id-token: write   # Authenticate with PyPI via OIDC (no token needed)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # PSR needs full history to determine version bumps

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx python-semantic-release version

      - name: Publish to PyPI
        run: uv publish

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx python-semantic-release publish
